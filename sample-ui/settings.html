<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>LogiTrack - 系統設定</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="css/app.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
</head>
<body>

<div class="app-layout">

	<!-- 側邊欄 -->
	<aside class="sidebar" id="sidebar">
		<div class="sidebar-brand">
			<div class="sidebar-brand-icon">📦</div>
			<span class="sidebar-brand-name">LogiTrack</span>
		</div>
		<ul class="sidebar-nav">
			<li class="sidebar-nav-item">
				<a href="index.html" class="sidebar-nav-link">
					<span class="nav-icon">📊</span>
					<span class="nav-label">總覽儀表板</span>
				</a>
				<span class="nav-tooltip">總覽儀表板</span>
			</li>
			<li class="sidebar-nav-item">
				<a href="orders.html" class="sidebar-nav-link">
					<span class="nav-icon">📋</span>
					<span class="nav-label">訂單管理</span>
				</a>
				<span class="nav-tooltip">訂單管理</span>
			</li>
			<li class="sidebar-nav-item">
				<a href="shipments.html" class="sidebar-nav-link">
					<span class="nav-icon">🚚</span>
					<span class="nav-label">出貨追蹤</span>
				</a>
				<span class="nav-tooltip">出貨追蹤</span>
			</li>
			<li class="sidebar-nav-item">
				<a href="products.html" class="sidebar-nav-link">
					<span class="nav-icon">🏷️</span>
					<span class="nav-label">商品庫存</span>
				</a>
				<span class="nav-tooltip">商品庫存</span>
			</li>
			<li class="sidebar-nav-item">
				<a href="settings.html" class="sidebar-nav-link active">
					<span class="nav-icon">⚙️</span>
					<span class="nav-label">系統設定</span>
				</a>
				<span class="nav-tooltip">系統設定</span>
			</li>
		</ul>
		<div class="sidebar-footer">
			<button class="sidebar-toggle-btn" id="sidebarToggle">
				<span class="nav-icon toggle-icon">«</span>
				<span class="nav-label toggle-label">收合選單</span>
			</button>
		</div>
	</aside>

	<!-- 頂部導覽列 -->
	<header class="topbar" id="topbar">
		<h1 class="topbar-title">系統設定</h1>
		<div class="topbar-avatar" title="管理員">管</div>
	</header>

	<!-- 主內容 -->
	<main class="main-content" id="mainContent">

		<div class="row g-4">
			<!-- 左欄 -->
			<div class="col-lg-8">

				<!-- 帳號資訊 -->
				<div class="content-card mb-4">
					<div class="content-card-header">
						<h2 class="content-card-title">帳號資訊</h2>
					</div>
					<div class="content-card-body">
						<div class="settings-section">
							<div class="settings-section-title">個人資料</div>
							<div class="row g-3">
								<div class="col-md-6">
									<label class="form-label">姓名</label>
									<input type="text" class="form-control" value="系統管理員">
								</div>
								<div class="col-md-6">
									<label class="form-label">電子郵件</label>
									<input type="email" class="form-control" value="admin@logitrack.com">
								</div>
								<div class="col-md-6">
									<label class="form-label">電話</label>
									<input type="tel" class="form-control" value="02-1234-5678">
								</div>
								<div class="col-md-6">
									<label class="form-label">時區</label>
									<select class="form-select">
										<option selected>Asia/Taipei (UTC+8)</option>
										<option>Asia/Tokyo (UTC+9)</option>
										<option>UTC (UTC+0)</option>
									</select>
								</div>
							</div>
						</div>

						<div class="settings-section">
							<div class="settings-section-title">變更密碼</div>
							<div class="row g-3">
								<div class="col-md-6">
									<label class="form-label">目前密碼</label>
									<input type="password" class="form-control" placeholder="輸入目前密碼">
								</div>
								<div class="col-md-6"></div>
								<div class="col-md-6">
									<label class="form-label">新密碼</label>
									<input type="password" class="form-control" placeholder="輸入新密碼">
								</div>
								<div class="col-md-6">
									<label class="form-label">確認新密碼</label>
									<input type="password" class="form-control" placeholder="再次輸入新密碼">
								</div>
							</div>
						</div>

						<div class="d-flex gap-2 justify-content-end">
							<button class="btn btn-outline-secondary">取消</button>
							<button class="btn btn-primary">儲存變更</button>
						</div>
					</div>
				</div>

				<!-- 通知設定 -->
				<div class="content-card mb-4">
					<div class="content-card-header">
						<h2 class="content-card-title">通知設定</h2>
					</div>
					<div class="content-card-body">
						<div class="settings-section-title">電子郵件通知</div>
						<div class="d-flex flex-column gap-3 mb-4">
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="notifNewOrder" checked>
								<label class="form-check-label" for="notifNewOrder">
									<span class="d-block" style="font-weight:500;">新訂單通知</span>
									<span class="text-muted" style="font-size:0.85rem;">有新訂單建立時發送通知</span>
								</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="notifShipment" checked>
								<label class="form-check-label" for="notifShipment">
									<span class="d-block" style="font-weight:500;">出貨狀態更新</span>
									<span class="text-muted" style="font-size:0.85rem;">出貨狀態變更時發送通知</span>
								</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="notifLowStock">
								<label class="form-check-label" for="notifLowStock">
									<span class="d-block" style="font-weight:500;">低庫存警示</span>
									<span class="text-muted" style="font-size:0.85rem;">商品庫存低於警戒值時發送通知</span>
								</label>
							</div>
							<div class="form-check form-switch">
								<input class="form-check-input" type="checkbox" id="notifReport">
								<label class="form-check-label" for="notifReport">
									<span class="d-block" style="font-weight:500;">每週報表</span>
									<span class="text-muted" style="font-size:0.85rem;">每週一發送上週業績摘要</span>
								</label>
							</div>
						</div>
						<div class="d-flex justify-content-end">
							<button class="btn btn-primary">儲存通知設定</button>
						</div>
					</div>
				</div>

			</div>

			<!-- 右欄 -->
			<div class="col-lg-4">

				<!-- 系統資訊 -->
				<div class="content-card mb-4">
					<div class="content-card-header">
						<h2 class="content-card-title">系統資訊</h2>
					</div>
					<div class="content-card-body">
						<dl class="row mb-0" style="font-size:0.88rem;">
							<dt class="col-6 text-muted fw-normal">版本</dt>
							<dd class="col-6">v2.4.1</dd>
							<dt class="col-6 text-muted fw-normal">環境</dt>
							<dd class="col-6"><span class="badge bg-success">Production</span></dd>
							<dt class="col-6 text-muted fw-normal">最後更新</dt>
							<dd class="col-6">2024-03-15</dd>
							<dt class="col-6 text-muted fw-normal">資料庫</dt>
							<dd class="col-6 text-success">● 正常</dd>
							<dt class="col-6 text-muted fw-normal">API 伺服器</dt>
							<dd class="col-6 text-success">● 正常</dd>
						</dl>
					</div>
				</div>

				<!-- 庫存警戒設定 -->
				<div class="content-card mb-4">
					<div class="content-card-header">
						<h2 class="content-card-title">庫存警戒值</h2>
					</div>
					<div class="content-card-body">
						<p class="text-muted" style="font-size:0.85rem;">當商品庫存低於以下數量時，系統將顯示警示。</p>
						<div class="mb-3">
							<label class="form-label">緊急警示（紅色）</label>
							<div class="input-group input-group-sm">
								<input type="number" class="form-control" value="10">
								<span class="input-group-text">件</span>
							</div>
						</div>
						<div class="mb-3">
							<label class="form-label">注意警示（橘色）</label>
							<div class="input-group input-group-sm">
								<input type="number" class="form-control" value="30">
								<span class="input-group-text">件</span>
							</div>
						</div>
						<button class="btn btn-sm btn-primary w-100">儲存</button>
					</div>
				</div>

				<!-- 危險操作 -->
				<div class="content-card border-danger">
					<div class="content-card-header" style="border-color:#fcd0d0;">
						<h2 class="content-card-title text-danger">危險操作</h2>
					</div>
					<div class="content-card-body">
						<p class="text-muted" style="font-size:0.85rem;">以下操作無法復原，請謹慎使用。</p>
						<div class="d-flex flex-column gap-2">
							<button class="btn btn-sm btn-outline-danger">清除所有快取</button>
							<button class="btn btn-sm btn-outline-danger">重設通知設定</button>
							<button class="btn btn-sm btn-danger">刪除所有測試資料</button>
						</div>
					</div>
				</div>

			</div>
		</div>

	</main>
</div>

<button class="back-to-top" id="backToTop" title="返回最上方"><i class="fa-solid fa-circle-arrow-up"></i></button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/sidebar.js"></script>
</body>
</html>
