<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>LogiTrack - 訂單管理</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="css/app.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
</head>
<body>

<div class="app-layout">

	<!-- 側邊欄 -->
	<aside class="sidebar" id="sidebar">
		<div class="sidebar-brand">
			<div class="sidebar-brand-icon">📦</div>
			<span class="sidebar-brand-name">LogiTrack</span>
		</div>
		<ul class="sidebar-nav">
			<li class="sidebar-nav-item">
				<a href="index.html" class="sidebar-nav-link">
					<span class="nav-icon">📊</span>
					<span class="nav-label">總覽儀表板</span>
				</a>
				<span class="nav-tooltip">總覽儀表板</span>
			</li>
			<li class="sidebar-nav-item">
				<a href="orders.html" class="sidebar-nav-link active">
					<span class="nav-icon">📋</span>
					<span class="nav-label">訂單管理</span>
				</a>
				<span class="nav-tooltip">訂單管理</span>
			</li>
			<li class="sidebar-nav-item">
				<a href="shipments.html" class="sidebar-nav-link">
					<span class="nav-icon">🚚</span>
					<span class="nav-label">出貨追蹤</span>
				</a>
				<span class="nav-tooltip">出貨追蹤</span>
			</li>
			<li class="sidebar-nav-item">
				<a href="products.html" class="sidebar-nav-link">
					<span class="nav-icon">🏷️</span>
					<span class="nav-label">商品庫存</span>
				</a>
				<span class="nav-tooltip">商品庫存</span>
			</li>
			<li class="sidebar-nav-item">
				<a href="settings.html" class="sidebar-nav-link">
					<span class="nav-icon">⚙️</span>
					<span class="nav-label">系統設定</span>
				</a>
				<span class="nav-tooltip">系統設定</span>
			</li>
		</ul>
		<div class="sidebar-footer">
			<button class="sidebar-toggle-btn" id="sidebarToggle">
				<span class="nav-icon toggle-icon">«</span>
				<span class="nav-label toggle-label">收合選單</span>
			</button>
		</div>
	</aside>

	<!-- 頂部導覽列 -->
	<header class="topbar" id="topbar">
		<h1 class="topbar-title">訂單管理</h1>
		<span class="text-muted" style="font-size:0.85rem;">共 20 筆訂單</span>
		<div class="topbar-avatar" title="管理員">管</div>
	</header>

	<!-- 主內容 -->
	<main class="main-content" id="mainContent">

		<div class="content-card mb-4">
			<div class="content-card-body">
				<div class="row g-3 filter-toolbar">
					<div class="col-md-3">
						<label class="form-label text-muted" style="font-size:0.8rem;">訂單狀態</label>
						<select class="form-select form-select-sm" id="filterStatus">
							<option value="">全部狀態</option>
							<option value="pending">待處理</option>
							<option value="processing">處理中</option>
							<option value="shipped">已出貨</option>
							<option value="delivered">已送達</option>
							<option value="cancelled">已取消</option>
						</select>
					</div>
					<div class="col-md-3">
						<label class="form-label text-muted" style="font-size:0.8rem;">開始日期</label>
						<input type="date" class="form-control form-control-sm" id="filterDateFrom" value="2024-03-01">
					</div>
					<div class="col-md-3">
						<label class="form-label text-muted" style="font-size:0.8rem;">結束日期</label>
						<input type="date" class="form-control form-control-sm" id="filterDateTo" value="2024-03-22">
					</div>
					<div class="col-md-3">
						<label class="form-label text-muted" style="font-size:0.8rem;">搜尋客戶</label>
						<input type="text" class="form-control form-control-sm" id="filterKeyword" placeholder="輸入姓名或訂單編號">
					</div>
					<div class="col-12 d-flex gap-2">
						<button class="btn btn-primary btn-sm" id="btnFilter">套用篩選</button>
						<button class="btn btn-outline-secondary btn-sm" id="btnReset">重置</button>
						<span class="text-muted align-self-center ms-2" style="font-size:0.85rem;" id="filterResultCount"></span>
					</div>
				</div>
			</div>
		</div>

		<div class="content-card">
			<div class="content-card-header">
				<h2 class="content-card-title">訂單列表</h2>
				<button class="btn btn-sm btn-outline-primary">匯出 CSV</button>
			</div>
			<div class="table-responsive">
				<table class="table orders-table mb-0" id="ordersTable">
					<thead>
						<tr>
							<th>訂單編號</th>
							<th>客戶</th>
							<th>商品數</th>
							<th>金額</th>
							<th>狀態</th>
							<th>建立日期</th>
							<th style="width:80px;">操作</th>
						</tr>
					</thead>
					<tbody></tbody>
				</table>
			</div>
		</div>

	</main>
</div>

<!-- 訂單詳情 Modal -->
<div class="modal fade" id="orderDetailModal" tabindex="-1">
	<div class="modal-dialog modal-lg">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title" id="modalOrderId">訂單詳情</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
			</div>
			<div class="modal-body" id="modalOrderBody"></div>
			<div class="modal-footer">
				<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
				<button type="button" class="btn btn-primary">儲存變更</button>
			</div>
		</div>
	</div>
</div>

<button class="back-to-top" id="backToTop" title="返回最上方"><i class="fa-solid fa-circle-arrow-up"></i></button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/orders.js"></script>
</body>
</html>
