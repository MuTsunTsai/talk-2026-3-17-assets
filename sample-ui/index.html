<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>LogiTrack - 總覽儀表板</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="css/app.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
</head>
<body>

<div class="app-layout">

	<!-- 側邊欄 -->
	<aside class="sidebar" id="sidebar">
		<div class="sidebar-brand">
			<div class="sidebar-brand-icon">📦</div>
			<span class="sidebar-brand-name">LogiTrack</span>
		</div>
		<ul class="sidebar-nav">
			<li class="sidebar-nav-item">
				<a href="index.html" class="sidebar-nav-link active">
					<span class="nav-icon">📊</span>
					<span class="nav-label">總覽儀表板</span>
				</a>
				<span class="nav-tooltip">總覽儀表板</span>
			</li>
			<li class="sidebar-nav-item">
				<a href="orders.html" class="sidebar-nav-link">
					<span class="nav-icon">📋</span>
					<span class="nav-label">訂單管理</span>
				</a>
				<span class="nav-tooltip">訂單管理</span>
			</li>
			<li class="sidebar-nav-item">
				<a href="shipments.html" class="sidebar-nav-link">
					<span class="nav-icon">🚚</span>
					<span class="nav-label">出貨追蹤</span>
				</a>
				<span class="nav-tooltip">出貨追蹤</span>
			</li>
			<li class="sidebar-nav-item">
				<a href="products.html" class="sidebar-nav-link">
					<span class="nav-icon">🏷️</span>
					<span class="nav-label">商品庫存</span>
				</a>
				<span class="nav-tooltip">商品庫存</span>
			</li>
			<li class="sidebar-nav-item">
				<a href="settings.html" class="sidebar-nav-link">
					<span class="nav-icon">⚙️</span>
					<span class="nav-label">系統設定</span>
				</a>
				<span class="nav-tooltip">系統設定</span>
			</li>
		</ul>
		<div class="sidebar-footer">
			<button class="sidebar-toggle-btn" id="sidebarToggle">
				<span class="nav-icon toggle-icon">«</span>
				<span class="nav-label toggle-label">收合選單</span>
			</button>
		</div>
	</aside>

	<!-- 頂部導覽列 -->
	<header class="topbar" id="topbar">
		<h1 class="topbar-title">總覽儀表板</h1>
		<span class="text-muted" style="font-size:0.85rem;">2024年3月22日</span>
		<div class="topbar-avatar" title="管理員">管</div>
	</header>

	<!-- 主內容 -->
	<main class="main-content" id="mainContent">

		<div class="row g-4 mb-4" id="statsRow"></div>

		<div class="row g-4 mb-4">
			<!-- 折線圖 -->
			<div class="col-lg-8">
				<div class="content-card">
					<div class="content-card-header">
						<h2 class="content-card-title">近 7 日訂單趨勢</h2>
						<span class="badge bg-light text-muted">本週</span>
					</div>
					<div class="content-card-body">
						<canvas class="chart-canvas" id="trendChart"></canvas>
					</div>
				</div>
			</div>

			<!-- 狀態分佈 -->
			<div class="col-lg-4">
				<div class="content-card h-100">
					<div class="content-card-header">
						<h2 class="content-card-title">訂單狀態分佈</h2>
					</div>
					<div class="content-card-body" id="statusDist"></div>
				</div>
			</div>
		</div>

		<!-- 最新訂單 -->
		<div class="content-card">
			<div class="content-card-header">
				<h2 class="content-card-title">最新訂單</h2>
				<a href="orders.html" class="btn btn-sm btn-outline-primary">查看全部</a>
			</div>
			<div class="table-responsive">
				<table class="table orders-table mb-0" id="recentOrdersTable">
					<thead>
						<tr>
							<th>訂單編號</th>
							<th>客戶</th>
							<th>商品數</th>
							<th>金額</th>
							<th>狀態</th>
							<th>日期</th>
						</tr>
					</thead>
					<tbody></tbody>
				</table>
			</div>
		</div>

	</main>
</div>

<button class="back-to-top" id="backToTop" title="返回最上方"><i class="fa-solid fa-circle-arrow-up"></i></button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/data.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
